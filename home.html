<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aoiseikou // Home</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/home.css">

</head>

<body>

<!-- LIGHT RAYS -->
<svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" class="bg">
    <polygon points="-200,-200 600,0 1200,900 300,900" class="ray r1"/>
    <polygon points="-200,-200 800,0 1400,900 700,900" class="ray r2"/>
    <polygon points="-200,-200 900,0 1440,900 1100,900" class="ray r3"/>
    <polygon points="-200,-200 1050,0 1440,700 1300,900" class="ray r4"/>
</svg>

<div class="hub">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">AOISEIKOU</div>
        <div class="tagline">#DocumentingCulture</div>
    </div>

    <div class="container">

        <!-- CULTURE -->
        <div class="category active">
            <div class="cat-title">Culture Core</div>

            <div class="tiles">
                <div class="tile focused" data-link="festival.html">Festival</div>
                <div class="tile" data-link="autoshow.html">Autoshow</div>
                <div class="tile" data-link="wildstyle.html">WildStyle</div>
            </div>
        </div>

        <!-- SYSTEM -->
        <div class="category">
            <div class="cat-title">System Layer</div>

            <div class="tiles">
                <div class="tile" data-link="racing.html">Racing Division</div>
                <div class="tile" data-link="blogs.html">Blogs</div>
                <div class="tile" data-link="community.html">Community</div>
            </div>
        </div>

    </div>

    <!-- PREVIEW -->
    <div class="preview">
        <div id="p-title">Festival</div>
        <div id="p-desc">Gatherings of culture</div>
        <div id="p-cat">Culture Core</div>
    </div>

</div>

<script src="js/home.js"></script>

</body>
</html>
